name: sikap_mobile
description: SIKAP Darur Rohman - Sistem Informasi Keuangan & Pelaporan Pondok Pesantren
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Backend
  supabase_flutter: ^2.5.0

  # Routing
  go_router: ^14.0.0

  # Charts
  fl_chart: ^0.68.0

  # Fonts & Icons
  google_fonts: ^6.2.1
  iconsax_flutter: ^1.0.1

  # PDF & Export
  pdf: ^3.11.1
  printing: ^5.13.2

  # Excel Export
  excel: ^4.0.6

  # Utilities
  intl: ^0.19.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  gap: ^3.0.1
  path_provider: ^2.1.3
  share_plus: ^10.0.2
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
